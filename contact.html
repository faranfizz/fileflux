<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — FluxFiles</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c26; --border:#2a2a3a; --accent:#00e5a0; --text:#f0f0f8; --muted:#7a7a99; --radius:14px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  nav { display:flex; align-items:center; justify-content:space-between; padding:20px 40px; border-bottom:1px solid var(--border); background:rgba(10,10,15,0.9); }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; text-decoration:none; color:var(--text); }
  .logo span { color:var(--accent); }
  .content { max-width:560px; margin:60px auto; padding:0 24px 80px; text-align:center; }
  h1 { font-family:'Syne',sans-serif; font-size:36px; font-weight:800; margin-bottom:12px; }
  .sub { color:var(--muted); font-size:16px; margin-bottom:40px; line-height:1.6; }
  .contact-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:32px; text-align:left; }
  label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em; }
  input, textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:12px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
    margin-bottom:20px; transition:border-color 0.2s; outline:none;
  }
  input:focus, textarea:focus { border-color:var(--accent); }
  textarea { resize:vertical; min-height:120px; }
  button {
    width:100%; padding:14px; background:var(--accent); border:none; border-radius:10px;
    color:#000; font-family:'Syne',sans-serif; font-size:16px; font-weight:700; cursor:pointer;
    transition:opacity 0.2s;
  }
  button:hover { opacity:0.85; }
  .success-msg { display:none; color:var(--accent); text-align:center; margin-top:16px; font-weight:600; }
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">Flux<span>Files</span></a>
</nav>
<div class="content">
  <h1>Contact Us</h1>
  <p class="sub">Have a question, bug report, or feature request? We'd love to hear from you.</p>
  <div class="contact-card">
    <label>Your Name</label>
    <input type="text" id="name" placeholder="John Doe">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com">
    <label>Message</label>
    <textarea id="message" placeholder="Tell us what's on your mind..."></textarea>
    <button onclick="submitForm()">Send Message ✉️</button>
    <p class="success-msg" id="successMsg">✅ Thanks! We'll get back to you soon.</p>
  </div>
</div>
<script>
  function submitForm() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const message = document.getElementById('message').value;
    if (!name || !email || !message) { alert('Please fill in all fields.'); return; }
    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('message').value = '';
  }
</script>
</body>
</html>
